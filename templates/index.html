<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Predictive Pulse - Hypertension AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h2>Predictive Pulse - Hypertension AI</h2>

        <!-- Heart Animation -->
        <div class="heart"></div>
        <div class="gauge">

            <div class="gauge-body">

                <div class="gauge-fill"></div>

                <div class="gauge-cover">BP</div>

            </div>

        </div>

        <!-- Running Pulse Line -->
        <div class="pulse-line">
            <svg viewBox="0 0 200 40">
                <polyline fill="none" stroke="#ff3b3b" stroke-width="3"
                    points="0,20 20,20 30,5 40,35 50,20 70,20 80,10 90,30 100,20 200,20" />
            </svg>
        </div>

        <form action="/predict" method="POST">

            <label>Gender</label>
            <select name="Gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label>Age</label>
            <input type="number" name="Age" required>

            <label>Systolic Pressure</label>
            <input type="number" name="Systolic" required>

            <label>Diastolic Pressure</label>
            <input type="number" name="Diastolic" required>


            </label>

            <div class="checkbox-group">

                <label class="check-item">
                    <input type="checkbox" name="History">
                    <span>Family History</span>
                </label>

                <label class="check-item">
                    <input type="checkbox" name="BreathShortness">
                    <span>Shortness of Breath</span>
                </label>

            </div>

            <button type="submit">Predict Stage</button>
            <div id="loading" style="display:none;text-align:center;margin-top:20px;">

                AI analyzing patient data...

            </div>

        </form>

        {% if prediction_text %}

        <div class="result">
            <h3>{{ prediction_text }}</h3>
        </div>

        <canvas id="bpChart" width="300" height="200"></canvas>

        {% endif %}

    </div>

</body>

</html>
<script>

    const ctx = document.getElementById('bpChart');

    if (ctx) {

        new Chart(ctx, {
            type: 'bar',
            data: {

                labels: ['Normal', 'Elevated', 'Stage 1', 'Stage 2'],

                datasets: [{
                    label: 'Hypertension Stage',

                    data: [1, 2, 3, 4],

                    backgroundColor: [

                        '#2ecc71',
                        '#f1c40f',
                        '#e67e22',
                        '#e74c3c'

                    ]

                }]

            },

            options: {

                plugins: {
                    legend: { display: false }
                }

            }

        });

    }

</script>
