<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Predictive Pulse - Hypertension AI</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h2>Hypertension Stage Prediction</h2>

        <!-- Prediction Form -->
        <form action="/predict" method="POST">

            <label for="gender">Gender</label>
            <select name="Gender" id="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label for="age">Age</label>
            <input type="number" name="Age" id="age" placeholder="e.g. 45" required>

            <label for="systolic">Systolic Pressure (mmHg)</label>
            <input type="number" name="Systolic" id="systolic" placeholder="e.g. 130" required>

            <label for="diastolic">Diastolic Pressure (mmHg)</label>
            <input type="number" name="Diastolic" id="diastolic" placeholder="e.g. 85" required>

            <div class="checkbox-group">

                <label>
                    <input type="checkbox" name="History">
                    Family History
                </label>

                <label>
                    <input type="checkbox" name="BreathShortness">
                    Shortness of Breath
                </label>

            </div>

            <button type="submit">Predict Stage</button>

        </form>

        <!-- Prediction Result -->
        {% if prediction_text %}

        <div class="result {{ result_color }}">
            <h3>{{ prediction_text }}</h3>
        </div>

        {% endif %}

    </div>

</body>

</html>
