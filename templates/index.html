<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Hypertension Detection</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Hypertension Detection</h1>

        <form action="/predict" method="POST">

            <div class="grid">

                <select name="gender">
                    <option value="0">Male</option>
                    <option value="1">Female</option>
                </select>

                <select name="age">
                    <option value="0">18-34</option>
                    <option value="1">35-50</option>
                    <option value="2">51-64</option>
                    <option value="3">65+</option>
                </select>

                <select name="family_history">
                    <option value="0">No Family History</option>
                    <option value="1">Yes</option>
                </select>

                <select name="medical_care">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>

                <select name="bp_med">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>

                <select name="symptom">
                    <option value="0">Mild</option>
                    <option value="1">Moderate</option>
                    <option value="2">Severe</option>
                </select>

                <select name="breath">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>

                <select name="vision">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>

                <select name="nosebleed">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>

                <select name="diagnosis">
                    <option value="0">Less than 1 year</option>
                    <option value="1">1-5 years</option>
                    <option value="2">5+ years</option>
                </select>

                <select name="systolic">
                    <option value="0">Normal</option>
                    <option value="1">Stage 1</option>
                    <option value="2">Stage 2</option>
                </select>

                <select name="diastolic">
                    <option value="0">Normal</option>
                    <option value="1">Stage 1</option>
                    <option value="2">Stage 2</option>
                </select>

                <select name="diet">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>

            </div>

            <button type="submit">Generate Risk Assessment</button>

        </form>

        {% if prediction_text %}

        <div class="result">

            <h2>{{ prediction_text }}</h2>

            <p>Risk Level: {{ risk }}</p>

        </div>

        {% endif %}

    </div>

</body>

</html>
