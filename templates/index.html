<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Predictive Pulse - Hypertension AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h2>Hypertension Stage Prediction</h2>

        <form action="/predict" method="POST">

            <label>Gender</label>
            <select name="Gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label>Age</label>
            <input type="number" name="Age" required>

            <label>Systolic Pressure</label>
            <input type="number" name="Systolic" required>

            <label>Diastolic Pressure</label>
            <input type="number" name="Diastolic" required>

            <label>Severity</label>
            <input type="number" step="0.1" name="Severity">

            <label>When Diagnosed (years)</label>
            <input type="number" step="0.1" name="WhenDiagnosed">

            <div class="checkbox-group">

                <label>
                    <input type="checkbox" name="History">
                    Family History
                </label>

                <label>
                    <input type="checkbox" name="Patient">
                    Currently Patient
                </label>

                <label>
                    <input type="checkbox" name="TakeMedication">
                    Taking Medication
                </label>

                <label>
                    <input type="checkbox" name="BreathShortness">
                    Shortness of Breath
                </label>

                <label>
                    <input type="checkbox" name="VisualChanges">
                    Visual Changes
                </label>

                <label>
                    <input type="checkbox" name="NoseBleeding">
                    Nose Bleeding
                </label>

                <label>
                    <input type="checkbox" name="ControlledDiet">
                    Controlled Diet
                </label>

            </div>

            <button type="submit">Predict Stage</button>

        </form>

        {% if prediction_text %}
        <div class="result">
            <h3>{{ prediction_text }}</h3>
        </div>
        {% endif %}

    </div>

</body>

</html>
